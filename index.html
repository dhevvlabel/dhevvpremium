<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Premium Digital Store</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        darkMode: 'class',
        theme: {
          extend: {
            fontFamily: {
              sans: ['"Plus Jakarta Sans"', 'sans-serif'],
            },
            colors: {
              burgundy: {
                950: '#2a0a10', // Very dark/Blackish
                900: '#4a0410', // Deepest Red
                800: '#6d071a', // Classic Burgundy
                700: '#800020', // Standard
                600: '#9b111e', // Brighter
                500: '#c21e38',
                100: '#fceef1',
              },
              gold: {
                700: '#8a6c0a',
                600: '#b8860b',
                500: '#d4af37', // Metallic Gold
                400: '#eac965',
                300: '#f3e5ab',
                100: '#fcf8e3',
              },
              glass: {
                100: 'rgba(255, 255, 255, 0.05)',
                200: 'rgba(255, 255, 255, 0.1)',
                300: 'rgba(255, 255, 255, 0.2)',
                dark: 'rgba(0, 0, 0, 0.6)',
                burgundy: 'rgba(74, 4, 16, 0.4)',
              }
            },
            animation: {
              'blob': 'blob 10s infinite',
              'toast-in-out': 'toast-in-out 3.5s cubic-bezier(0.16, 1, 0.3, 1) forwards',
            },
            keyframes: {
              blob: {
                '0%': { transform: 'translate(0px, 0px) scale(1)' },
                '33%': { transform: 'translate(30px, -50px) scale(1.1)' },
                '66%': { transform: 'translate(-20px, 20px) scale(0.9)' },
                '100%': { transform: 'translate(0px, 0px) scale(1)' },
              },
              'toast-in-out': {
                '0%': { transform: 'translateY(-200%)', opacity: '0' },
                '10%': { transform: 'translateY(0)', opacity: '1' },
                '85%': { transform: 'translateY(0)', opacity: '1' },
                '100%': { transform: 'translateY(-200%)', opacity: '0' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Plus Jakarta Sans', sans-serif;
      }
      /* Custom Scrollbar for Glass Effect */
      ::-webkit-scrollbar {
        width: 6px;
      }
      ::-webkit-scrollbar-track {
        background: transparent;
      }
      ::-webkit-scrollbar-thumb {
        background: rgba(212, 175, 55, 0.3); /* Gold tint */
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: rgba(212, 175, 55, 0.6);
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/",
    "react/": "https://esm.sh/react@^19.2.4/",
    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body class="bg-stone-100 text-burgundy-950 dark:bg-[#0f0505] dark:text-stone-100 transition-colors duration-500 selection:bg-gold-500/30">
    <div id="root"></div>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
